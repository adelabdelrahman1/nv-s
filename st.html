<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاستعلام عن النتيجة - مدارس نيو فيجن</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Tahoma', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .search-card {
            background: white;
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            text-align: center;
        }
        .school-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 15px;
        }
        .school-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .school-sub {
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        .info-note {
            background: #e8f4fd;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #2c3e50;
            border-right: 4px solid #3498db;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #2c3e50;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            direction: ltr;
            letter-spacing: 2px;
        }
        input:focus {
            outline: none;
            border-color: #ff8c00;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }
        button:hover {
            background: #ff8c00;
        }
        .result-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: none;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .student-info {
            padding: 20px;
            background: #f8f9fa;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .student-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .student-class {
            background: #ecf0f1;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
        }
        .student-id {
            color: #7f8c8d;
            font-size: 0.8rem;
            direction: ltr;
        }
        .section-title {
            font-weight: bold;
            padding: 12px 20px;
            background: #f0f0f0;
        }
        .subject-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .subject-name {
            color: #34495e;
        }
        .score-value {
            background: #ecf0f1;
            padding: 5px 18px;
            border-radius: 30px;
            font-weight: bold;
        }
        .print-buttons {
            display: flex;
            gap: 10px;
            padding: 20px;
        }
        .print-btn {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .loading {
            background: #e8f4fd;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
        @media print {
            body * { visibility: hidden; }
            .result-card, .result-card * { visibility: visible; }
            .result-card { position: absolute; top: 0; left: 0; right: 0; margin: 0; border-radius: 0; }
            .print-buttons { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="search-card">
        <div class="school-logo">🏫📚</div>
        <div class="school-name">مدارس نيو فيجن الخاصة</div>
        <div class="school-sub">New Vision Private Schools</div>
        <div class="info-note">📢 أدخل الرقم القومي المكون من 14 رقم</div>
        <div class="input-group">
            <label>🆔 الرقم القومي</label>
            <input type="text" id="nationalId" placeholder="مثال: 30912012602573" maxlength="14" autocomplete="off">
        </div>
        <button id="searchBtn">🔍 عرض النتيجة</button>
    </div>
    <div id="resultArea"></div>
    <div class="footer">
        <div>مدارس نيو فيجن الخاصة © 2026</div>
    </div>
</div>

<script>
    async function searchStudent() {
        const nationalId = document.getElementById('nationalId').value.trim();
        const resultDiv = document.getElementById('resultArea');
        
        if (!nationalId) {
            alert('⚠️ الرجاء إدخال الرقم القومي');
            return;
        }
        
        if (nationalId.length !== 14 || isNaN(nationalId)) {
            alert('⚠️ الرجاء إدخال 14 رقم صحيح');
            return;
        }
        
        resultDiv.innerHTML = '<div class="loading">⏳ جاري البحث...</div>';
        
        try {
            const response = await fetch('./data.json?t=' + Date.now());
            
            if (!response.ok) {
                resultDiv.innerHTML = '<div class="error-message">❌ ملف data.json غير موجود</div>';
                return;
            }
            
            const data = await response.json();
            const students = data.students || [];
            const results = data.results || [];
            
            if (students.length === 0) {
                resultDiv.innerHTML = '<div class="error-message">❌ لا توجد بيانات متاحة</div>';
                return;
            }
            
            const student = students.find(s => s.nationalId === nationalId);
            
            if (!student) {
                resultDiv.innerHTML = `<div class="error-message">❌ لا توجد نتائج للرقم: ${nationalId}</div>`;
                return;
            }
            
            const studentResults = results.filter(r => r.student_id === student.id && !r.is_hidden);
            
            if (studentResults.length === 0) {
                resultDiv.innerHTML = '<div class="error-message">⚠️ لا توجد نتائج ظاهرة</div>';
                return;
            }
            
            const added = studentResults.filter(r => r.is_added_to_total);
            const notAdded = studentResults.filter(r => !r.is_added_to_total);
            
            const gradeNames = {
                1: 'KG1', 2: 'KG2', 3: 'الصف الأول الابتدائي', 4: 'الصف الثاني الابتدائي',
                5: 'الصف الثالث الابتدائي', 6: 'الصف الرابع الابتدائي', 7: 'الصف الخامس الابتدائي',
                8: 'الصف السادس الابتدائي', 9: 'الصف الأول الإعدادي', 10: 'الصف الثاني الإعدادي',
                11: 'الصف الثالث الإعدادي', 12: 'الصف الأول الثانوي', 13: 'الصف الثاني الثانوي', 14: 'الصف الثالث الثانوي'
            };
            
            resultDiv.innerHTML = `
                <div class="result-card" style="display:block;">
                    <div class="result-header">
                        <h2>نتائج الطالب</h2>
                        <p>مدارس نيو فيجن الخاصة</p>
                    </div>
                    <div class="student-info">
                        <div class="student-name">${escapeHtml(student.name)}</div>
                        <div class="student-class">📚 ${gradeNames[student.grade_level_id] || '-'}</div>
                        <div class="student-id">🆔 ${student.nationalId}</div>
                    </div>
                    
                    <div class="section-title" style="background:#d4edda;color:#155724;">✅ المواد المضافة للمجموع</div>
                    ${added.map(r => `<div class="subject-item"><span class="subject-name">📖 ${escapeHtml(r.subject_name)}</span><span class="score-value">${escapeHtml(r.subject_grade)}</span></div>`).join('')}
                    
                    ${notAdded.length > 0 ? `
                        <div class="section-title" style="background:#fff3cd;color:#856404;">⚠️ المواد غير المضافة للمجموع</div>
                        ${notAdded.map(r => `<div class="subject-item"><span class="subject-name">📖 ${escapeHtml(r.subject_name)}</span><span class="score-value">${escapeHtml(r.subject_grade)}</span></div>`).join('')}
                    ` : ''}
                    
                    <div class="print-buttons">
                        <button class="print-btn" onclick="window.print()">🖨️ طباعة</button>
                        <button class="print-btn" onclick="closeResult()">✖️ بحث جديد</button>
                    </div>
                </div>
            `;
            
        } catch(err) {
            resultDiv.innerHTML = '<div class="error-message">❌ خطأ: ' + err.message + '</div>';
        }
    }
    
    function closeResult() {
        document.getElementById('resultArea').innerHTML = '';
        document.getElementById('nationalId').value = '';
        document.getElementById('nationalId').focus();
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('searchBtn').addEventListener('click', searchStudent);
    document.getElementById('nationalId').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchStudent();
    });
</script>
</body>
</html>
